<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETA Prediction</title>

    <!-- Static CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="container">
        <h1>ETA Prediction</h1>

        <!-- Prediction Form -->
        <form method="post" action="/">
            <label for="delivery_partner">Delivery Partner</label>
            <input type="text" id="delivery_partner" name="delivery_partner" required>

            <label for="package_type">Package Type</label>
            <input type="text" id="package_type" name="package_type" required>

            <label for="vehicle_type">Vehicle Type</label>
            <input type="text" id="vehicle_type" name="vehicle_type" required>

            <label for="delivery_mode">Delivery Mode</label>
            <input type="text" id="delivery_mode" name="delivery_mode" required>

            <label for="region">Region</label>
            <input type="text" id="region" name="region" required>

            <label for="weather_condition">Weather Condition</label>
            <input type="text" id="weather_condition" name="weather_condition" required>

            <label for="distance_km">Distance (KM)</label>
            <input type="number" step="0.01" id="distance_km" name="distance_km" required>

            <label for="package_weight_kg">Package Weight (KG)</label>
            <input type="number" step="0.01" id="package_weight_kg" name="package_weight_kg" required>

            <button type="submit">Predict ETA Error</button>
        </form>

        <!-- Train Button -->
        <form method="get" action="/train">
            <button type="submit" class="train-button">Train Model</button>
        </form>

        <!-- Result -->
        {% if context %}
        <div class="result">
            <h2>Prediction: {{ context }}</h2>
        </div>
        {% endif %}
    </div>
</body>
</html>
