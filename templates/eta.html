<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETA Prediction Dashboard</title>
    
    <style>
        /* Base Reset and Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            padding: 20px;
            color: #1e293b;
        }

        /* Card Container */
        .container {
            width: 100%;
            max-width: 650px;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 6px rgba(0, 0, 0, 0.03);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .header p {
            color: #64748b;
            font-size: 0.95rem;
        }

        /* Form Layout */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        /* Inputs & Selects */
        input, select {
            padding: 12px;
            font-size: 0.95rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background-color: #f8fafc;
            color: #334155;
            font-family: inherit;
            transition: all 0.2s ease;
            appearance: auto;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .primary-btn {
            background-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .primary-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 6px 10px rgba(37, 99, 235, 0.3);
        }

        .divider {
            border: 0;
            height: 1px;
            background-color: #e2e8f0;
            margin: 25px 0;
        }

        .train-button:disabled {
            background-color: #f1f5f9;
            color: #94a3b8;
            border: 1px dashed #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* === NEW CLEAN RESULTS SECTION === */
        .result {
            margin-top: 25px;
            padding: 20px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-left: 5px solid #3b82f6; /* Blue accent line on the left */
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .result-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 1.3rem; /* Much more reasonable size */
            font-weight: 600;
            color: #1e293b;
        }

        @media (max-width: 500px) {
            .container { padding: 25px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ETA Prediction</h1>
            <p>Enter delivery details to forecast expected delays.</p>
        </div>

        <form method="post" action="/">
            <div class="form-grid">
                
                <div class="input-group">
                    <label for="delivery_partner">Delivery Partner</label>
                    <select id="delivery_partner" name="delivery_partner" required>
                        <option value="" disabled selected>Select Partner</option>
                        <option value="delhivery">Delhivery</option>
                        <option value="xpressbees">Xpressbees</option>
                        <option value="shadowfax">Shadowfax</option>
                        <option value="dhl">DHL</option>
                        <option value="amazon logistics">Amazon Logistics</option>
                        <option value="blue dart">Blue Dart</option>
                        <option value="fedex">FedEx</option>
                        <option value="ecom express">Ecom Express</option>
                        <option value="ekart">Ekart</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="package_type">Package Type</label>
                    <select id="package_type" name="package_type" required>
                        <option value="" disabled selected>Select Type</option>
                        <option value="automobile parts">Automobile Parts</option>
                        <option value="cosmetics">Cosmetics</option>
                        <option value="groceries">Groceries</option>
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="documents">Documents</option>
                        <option value="fragile items">Fragile Items</option>
                        <option value="pharmacy">Pharmacy</option>
                        <option value="furniture">Furniture</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="vehicle_type">Vehicle Type</label>
                    <select id="vehicle_type" name="vehicle_type" required>
                        <option value="" disabled selected>Select Vehicle</option>
                        <option value="bike">Bike</option>
                        <option value="ev van">EV Van</option>
                        <option value="truck">Truck</option>
                        <option value="van">Van</option>
                        <option value="ev bike">EV Bike</option>
                        <option value="scooter">Scooter</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="delivery_mode">Delivery Mode</label>
                    <select id="delivery_mode" name="delivery_mode" required>
                        <option value="" disabled selected>Select Mode</option>
                        <option value="same day">Same Day</option>
                        <option value="express">Express</option>
                        <option value="two day">Two Day</option>
                        <option value="standard">Standard</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="region">Region</label>
                    <select id="region" name="region" required>
                        <option value="" disabled selected>Select Region</option>
                        <option value="west">West</option>
                        <option value="central">Central</option>
                        <option value="east">East</option>
                        <option value="north">North</option>
                        <option value="south">South</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="weather_condition">Weather</label>
                    <select id="weather_condition" name="weather_condition" required>
                        <option value="" disabled selected>Select Weather</option>
                        <option value="clear">Clear</option>
                        <option value="cold">Cold</option>
                        <option value="rainy">Rainy</option>
                        <option value="foggy">Foggy</option>
                        <option value="hot">Hot</option>
                        <option value="stormy">Stormy</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="distance_km">Distance (KM)</label>
                    <input type="number" step="0.01" id="distance_km" name="distance_km" placeholder="e.g. 12.5" required>
                </div>

                <div class="input-group">
                    <label for="package_weight_kg">Weight (KG)</label>
                    <input type="number" step="0.01" id="package_weight_kg" name="package_weight_kg" placeholder="e.g. 2.4" required>
                </div>
            </div>

            <button type="submit" class="primary-btn">Predict ETA Error</button>
        </form>

        <hr class="divider">

        <form method="get" action="/train">
            <button type="submit" class="train-button" disabled title="Training pipeline is currently disabled">
                Train Model (Disabled)
            </button>
        </form>

        {% if context %}
        <div class="result">
            <div class="result-label">Predicted Outcome</div>
            <div class="result-value">{{ context }}</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
